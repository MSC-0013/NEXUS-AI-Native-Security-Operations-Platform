databases:
  - name: nexus-postgres
    databaseName: nexus
    user: nexus
    plan: basic-256mb

services:
  - type: redis
    name: nexus-redis
    plan: starter
    ipAllowList: []

  - type: web
    name: nexus-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /health
    preDeployCommand: npx tsx src/scripts/migrate.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: nexus-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: LLM_PROVIDER
        value: none
      - key: WEBHOOK_SIGNING_SECRET
        generateValue: true

  - type: worker
    name: nexus-worker
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    dockerCommand: npx tsx src/worker.ts
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: nexus-redis
          property: connectionString
      - key: JWT_SECRET
        fromService:
          type: web
          name: nexus-api
          envVarKey: JWT_SECRET
      - key: ENCRYPTION_KEY
        sync: false
      - key: LLM_PROVIDER
        value: none
